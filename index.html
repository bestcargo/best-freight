function haversine(lat1,lng1,lat2,lng2){
  const R=6371,toR=d=>d*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getDistance(fS,fG,tS,tG){
  const [a,b]=GU_COORDS[fG]||SIDO_COORDS[fS]||[37.5,127];
  const [c,d]=GU_COORDS[tG]||SIDO_COORDS[tS]||[37.5,127];
  let r=Math.max(haversine(a,b,c,d)*1.35,15);
  if(fS==="제주"||tS==="제주") r+=80;
  return Math.round(r);
}

            <button key={i} onClick={()=>setScreen(m.s)} style={{...cardS,padding:"16px 14px",border:"none",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:22}}>{m.icon}</span>
              <span style={{fontSize:14,fontWeight:"800",color:TEXT}}>{m.label}</span>
              <span style={{fontSize:11,color:SUB}}>{m.sub}</span>
            </button>
          ))}
        </div>
        <div onClick={()=>alert(`전화: ${CO.phone}`)} style={{...cardS,background:PL,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",border:`1px solid ${P}20`}}>
          <div>
            <div style={{fontSize:13,fontWeight:"800",color:P}}>📞 콜센터 바로연결</div>
            <div style={{fontSize:16,fontWeight:"900",color:TEXT,marginTop:2}}>{CO.phone}</div>
          </div>
          <div style={{width:40,height:40,background:P,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>→</div>
        </div>
      </div>
    </div>
    </>
  );
}

function FreightCallScreen({setScreen,addOrder,editOrder,updateOrder,clearEdit,savedPhone}){
  const isEdit=!!editOrder;
  const initForm=editOrder?{phone:editOrder.phone||(savedPhone||USER_PHONE),fromSido:editOrder.fromSido||"",fromGu:editOrder.fromGu||"",fromDong:editOrder.fromDong||"",toSido:editOrder.toSido||"",toGu:editOrder.toGu||"",toDong:editOrder.toDong||"",tonnage:editOrder.tonnage||"",vehicleType:editOrder.vehicleType||"",price:editOrder.price||0,date:editOrder.date||today(),time:editOrder.time||"",cargo:editOrder.cargo||""}:{phone:savedPhone||USER_PHONE,fromSido:"",fromGu:"",fromDong:"",toSido:"",toGu:"",toDong:"",tonnage:"",vehicleType:"",price:0,date:today(),time:"",cargo:""};
  const[form,setForm]=useState(initForm);
  const[modal,setModal]=useState(null);
  const[tmpSido,setTmpSido]=useState("");const[tmpGu,setTmpGu]=useState("");
  const[done,setDone]=useState(false);
  const[distKm,setDistKm]=useState(0);
  const[toast,setToast]=useState("");
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2200);};
  const[manualAdj,setManualAdj]=useState(isEdit?(editOrder.price-calcPrice(editOrder.fromSido,editOrder.fromGu,editOrder.toSido,editOrder.toGu,editOrder.tonnage,editOrder.vehicleType)):0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const selectSido=s=>{setTmpSido(s);setModal(modal.replace("Sido","Gu"));};
  const selectGu=g=>{
    const w=modal.replace("Gu","");
    set(w+"Sido",tmpSido);set(w+"Gu",g);set(w+"Dong","");
    setTmpGu(g);
    const dongs=(RG[tmpSido]||{})[g]||[];
    if(dongs.length>0){setModal(modal.replace("Gu","Dong"));}
    else{setModal(null);}
  };
  const selectDong=d=>{set(modal.replace("Dong","")+"Dong",d);setModal(null);};
  const getDongs=()=>{const w=(modal||"").replace("Dong","");const s=tmpSido||(w==="from"?form.fromSido:form.toSido);const g=tmpGu||(w==="from"?form.fromGu:form.toGu);return(RG[s]||{})[g]||[];};
  const hasDongs=w=>{const s=form[w+"Sido"],g=form[w+"Gu"];if(!s||!g)return true;return((RG[s]||{})[g]||[]).length>0;};

  // 카카오 우편번호 스크립트 로드
  useEffect(()=>{
    if(!document.getElementById('kakao-postcode-script')){
      const s=document.createElement('script');
      s.id='kakao-postcode-script';
      s.src='//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
      document.head.appendChild(s);
    }
  },[]);

  // 카카오 주소 검색 팝업
  const openPostcode=(which)=>{
    const open=()=>{
      new window.daum.Postcode({
        oncomplete:(data)=>{
          // 도로명 > 지번 > 법정동 순으로 가장 상세한 주소 사용
          const addr=data.roadAddress||data.jibunAddress||"";
          // 구/군 이후 상세주소만 추출
          const gu=form[which+"Gu"];
          let detail=addr;
          if(gu&&addr.includes(gu)){
            detail=addr.split(gu).slice(1).join(gu).trim();
          }
          set(which+"Dong", detail||addr);
          setModal(null);
        },
        width:'100%',height:'100%'
      }).open();
    };
    if(window.daum?.Postcode){ open(); }
    else{
      // 스크립트 로딩 대기
      const script=document.getElementById('kakao-postcode-script');
      if(script){ script.onload=open; }
      else{ alert('주소 검색 서비스를 불러오는 중입니다. 잠시 후 다시 시도해주세요.'); }
    }
  };

  useEffect(()=>{if(isEdit&&form.fromSido&&form.fromGu&&form.toSido&&form.toGu){setDistKm(getDistance(form.fromSido,form.fromGu,form.toSido,form.toGu));}},[]);
  useEffect(()=>{const{fromSido,fromGu,toSido,toGu,tonnage,vehicleType}=form;const noVtype=["오토바이","다마스","라보"];const ready=fromSido&&fromGu&&toSido&&toGu&&tonnage&&(vehicleType||noVtype.includes(tonnage));if(ready){const km=getDistance(fromSido,fromGu,toSido,toGu);setDistKm(km);const base=calcPrice(fromSido,fromGu,toSido,toGu,tonnage,vehicleType||"카고(일반차량)");setForm(f=>({...f,price:base+manualAdj}));}},[form.fromSido,form.fromGu,form.toSido,form.toGu,form.tonnage,form.vehicleType]);

  const adjustPrice=delta=>{setManualAdj(prev=>{const next=prev+delta;setForm(f=>({...f,price:Math.max(0,f.price+delta)}));return next;});};
  const locText=w=>{const s=form[w+"Sido"],g=form[w+"Gu"],d=form[w+"Dong"];return s?`${s} ${g} ${d}`.trim():null;};
  const canSubmit=form.phone&&form.fromDong&&form.toDong&&form.tonnage&&form.vehicleType&&form.time;
  const validate=()=>{
    if(!form.fromDong){showToast("📍 출발지를 선택해 주세요.");return false;}
    if(!form.toDong){showToast("📍 도착지를 선택해 주세요.");return false;}
    if(!form.phone){showToast("📞 고객 전화번호를 입력해 주세요.");return false;}
    if(!form.tonnage){showToast("🚛 차량 톤수를 선택해 주세요.");return false;}
    if(!form.vehicleType&&form.tonnage!=="오토바이"&&form.tonnage!=="다마스"&&form.tonnage!=="라보"){showToast("🚛 차량 종류를 선택해 주세요.");return false;}
    if(form.tonnage==="오토바이"&&(form.fromSido!=="서울"&&form.fromSido!=="경기")){showToast("⚠ 오토바이는 서울·경기 출발만 가능합니다.");return false;}
    if(form.tonnage==="오토바이"&&(form.toSido!=="서울"&&form.toSido!=="경기")){showToast("⚠ 오토바이는 서울·경기 도착만 가능합니다.");return false;}
    if(!form.date){showToast("📅 상차 날짜를 선택해 주세요.");return false;}
    if(!form.time){showToast("⏰ 상차 시간을 선택해 주세요.");return false;}
    if(!form.cargo){showToast("📦 운송물건을 입력해 주세요.");return false;}
    return true;
  };

  if(done)return(
    <div style={{padding:40,textAlign:"center",background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:72,height:72,background:PL,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:34}}>{isEdit?"✏️":"✅"}</div>
      <div style={{fontSize:22,fontWeight:"900",color:TEXT,marginBottom:8}}>{isEdit?"수정 완료!":"접수 완료!"}</div>
      <div style={{color:SUB,fontSize:14,marginBottom:24}}>{isEdit?"운송 정보가 업데이트되었습니다.":"담당자가 곧 연락드립니다."}</div>
      <div style={{...cardS,padding:20,marginBottom:24,textAlign:"left",width:"100%",maxWidth:360,boxSizing:"border-box"}}>
        {[["출발",`${form.fromSido} ${form.fromGu} ${form.fromDong}`],["도착",`${form.toSido} ${form.toGu} ${form.toDong}`],["차량",`${form.tonnage} / ${form.vehicleType}`],["운임",`${fmt(form.price)}원`],["일시",`${form.date} ${form.time}`]].map(([k,v],i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:10,paddingBottom:10,borderBottom:i<4?`1px solid ${BR}`:"none"}}>
            <span style={{color:SUB,fontSize:13,minWidth:32,flexShrink:0}}>{k}</span>
            <span style={{fontWeight:"700",fontSize:13,color:k==="운임"?P:TEXT}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,width:"100%",maxWidth:360}}>
        {!isEdit&&(<button onClick={()=>{setDone(false);setManualAdj(0);setDistKm(0);setForm({phone:savedPhone||USER_PHONE,fromSido:"",fromGu:"",fromDong:"",toSido:"",toGu:"",toDong:"",tonnage:"",vehicleType:"",price:0,date:today(),time:"",cargo:""});}} style={{...outlineBtn,flex:1}}>새 접수</button>)}
        <button onClick={()=>{if(isEdit){clearEdit();}setScreen("freightList");}} style={{flex:2,padding:"13px",border:"none",background:P,color:"#fff",fontSize:14,fontWeight:"800",borderRadius:14,cursor:"pointer"}}>목록 보기</button>
      </div>
    </div>
  );

  const RouteDot=({color})=><div style={{width:9,height:9,borderRadius:"50%",background:color,flexShrink:0}}></div>;
  const ci={...inp,padding:"9px 12px",fontSize:13};
  const cib=on=>({...ci,cursor:"pointer",textAlign:"center",color:on?TEXT:SUB,fontWeight:on?"700":"400",width:"100%"});

  return(
    <>
      {toast&&(
        <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"rgba(28,31,46,0.88)",color:"#fff",padding:"10px 20px",borderRadius:24,fontSize:13,fontWeight:"700",whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",pointerEvents:"none"}}>
          {toast}
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 98px)",background:BG,overflow:"hidden"}}>
        <div style={{padding:"10px 14px 0"}}>
          <div style={{fontSize:12,color:SUB,fontWeight:"600",marginBottom:6}}>운송경로</div>
          <div style={{...cardS,overflow:"hidden",marginBottom:8}}>
            {/* 출발지 */}
            <div style={{borderBottom:`1px solid ${BR}`}}>
              <button onClick={()=>{setTmpSido("");setTmpGu("");setModal("fromSido");}} style={{width:"100%",padding:"12px 16px",border:"none",background:CARD,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                <RouteDot color={GRN}/>
                <span style={{fontSize:14,color:locText("from")?TEXT:SUB,fontWeight:locText("from")?"700":"400"}}>
                  {form.fromSido?`${form.fromSido} ${form.fromGu}${form.fromDong?" "+form.fromDong:""}`:"출발지"}
                </span>
              </button>
              {/* 동 목록 없는 경우 도로명 주소 검색 */}
              {form.fromGu&&!hasDongs("from")&&(
                <div style={{padding:"0 16px 10px"}}>
                  <button onClick={()=>openPostcode("from")}
                    style={{width:"100%",padding:"8px 12px",border:`1.5px solid ${P}`,borderRadius:9,background:PL,color:P,fontSize:13,fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                    🔍 도로명 주소 검색
                  </button>
                  {form.fromDong&&<div style={{marginTop:5,fontSize:12,color:TEXT,fontWeight:"600",padding:"4px 6px",background:IBG,borderRadius:6}}>{form.fromDong}</div>}
                </div>
              )}
            </div>
            {/* 도착지 */}
            <div>
              <button onClick={()=>{if(!form.fromDong){showToast("먼저 출발지를 선택해 주세요.");return;}setTmpSido("");setTmpGu("");setModal("toSido");}} style={{width:"100%",padding:"12px 16px",border:"none",background:CARD,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                <RouteDot color={P}/>
                <span style={{fontSize:14,color:locText("to")?TEXT:SUB,fontWeight:locText("to")?"700":"400"}}>
                  {form.toSido?`${form.toSido} ${form.toGu}${form.toDong?" "+form.toDong:""}`:"도착지"}
                </span>
              </button>
              {form.toGu&&!hasDongs("to")&&(
                <div style={{padding:"0 16px 10px"}}>
                  <button onClick={()=>openPostcode("to")}
                    style={{width:"100%",padding:"8px 12px",border:`1.5px solid ${P}`,borderRadius:9,background:PL,color:P,fontSize:13,fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                    🔍 도로명 주소 검색
                  </button>
                  {form.toDong&&<div style={{marginTop:5,fontSize:12,color:TEXT,fontWeight:"600",padding:"4px 6px",background:IBG,borderRadius:6}}>{form.toDong}</div>}
                </div>
              )}
            </div>
          </div>
        </div>
        <div style={{...cardS,margin:"0 14px",padding:"12px 14px",flex:1,overflow:"auto",display:"flex",flexDirection:"column",gap:0}}>
          <div style={{marginBottom:9}}>
            <div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>고객 전화번호</div>
            <input style={ci} placeholder="010-0000-0000" value={form.phone} onChange={e=>set("phone",e.target.value)} type="tel"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
            <div><div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>차량 톤수</div><button onClick={()=>setModal("tonnage")} style={cib(!!form.tonnage)}>{form.tonnage||"톤수 선택"}</button></div>
            <div><div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>차량 종류</div><button onClick={()=>{ if(!form.tonnage){showToast("먼저 차량 톤수를 선택해 주세요.");return;} if(form.tonnage==="오토바이"||form.tonnage==="다마스"){showToast(form.tonnage+"는 차량 종류를 선택하지 않습니다.");return;} setModal("vehicleType"); }} style={{...cib(!!form.vehicleType),fontSize:11,cursor:(form.tonnage==="오토바이"||form.tonnage==="다마스")?"default":"pointer",opacity:(form.tonnage==="오토바이"||form.tonnage==="다마스")?0.4:1}}>{(form.tonnage==="오토바이"||form.tonnage==="다마스")?"해당없음":(form.vehicleType||"차종 선택")}</button></div>
          </div>
          <div style={{marginBottom:9}}>
            <div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>운송료</div>
            {distKm>0&&form.tonnage&&form.vehicleType&&(
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}>
                <span style={{background:PL,color:P,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:"700"}}>📍 {distKm}km</span>
                <span style={{background:IBG,color:TEXT,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:"600"}}>기본 {fmt(lookupRate(form.tonnage,distKm))}원</span>
                {form.vehicleType!=="카고(일반차량)"&&<span style={{background:"#FFF7ED",color:ORG,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:"700"}}>{form.vehicleType} +{Math.round((VTYPE_SURCHARGE[form.vehicleType]-1)*100)}%</span>}
                {manualAdj!==0&&<span style={{background:manualAdj>0?"#ECFDF5":"#FEF2F2",color:manualAdj>0?"#059669":RED,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:"700"}}>{manualAdj>0?"+":""}{fmt(manualAdj)}원 조정</span>}
              </div>
            )}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{...ci,flex:1,textAlign:"center",fontSize:15,fontWeight:"900",color:form.price?P:SUB,padding:"10px 0"}}>{form.price?fmt(form.price)+" 원":"자동 계산"}</div>
              <button onClick={()=>adjustPrice(-10000)} style={{background:IBG,border:"none",borderRadius:8,width:36,height:36,fontSize:15,cursor:"pointer",color:TEXT,fontWeight:"700",flexShrink:0}}>▼</button>
              <button onClick={()=>adjustPrice(10000)} style={{background:P,border:"none",borderRadius:8,width:36,height:36,fontSize:15,cursor:"pointer",color:"#fff",fontWeight:"700",flexShrink:0}}>▲</button>
            </div>
            <div style={{fontSize:10,color:SUB,marginTop:3}}>상하차 시간이 오래 걸리는 화물은 요금을 증액(▲)하셔야 빠른 배차가 가능합니다.</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
            <div><div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>상차 날짜</div><input type="date" style={ci} value={form.date} onChange={e=>set("date",e.target.value)}/></div>
            <div><div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>상차 시간</div><button onClick={()=>{if(!form.fromDong)return showToast("출발지를 선택해 주세요.");if(!form.toDong)return showToast("도착지를 선택해 주세요.");if(!form.tonnage)return showToast("차량 톤수를 선택해 주세요.");setModal("time");}} style={cib(!!form.time)}>{form.time||"시간 선택"}</button></div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            <div style={{fontSize:12,color:TEXT,fontWeight:"700",marginBottom:4}}>운송물건</div>
            <textarea style={{...ci,resize:"none",minHeight:60}} placeholder="운송할 물건에 대해 쓰시오" value={form.cargo} onChange={e=>set("cargo",e.target.value)}/>
          </div>
        </div>
        <div style={{padding:"10px 14px 14px",background:"#fff",boxShadow:"0 -2px 12px rgba(61,91,255,0.07)"}}>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{if(!validate())return;addOrder(form,"대기");setDone(true);}} style={{flex:1,padding:"13px",border:`1.5px solid ${BR}`,background:"#fff",color:SUB,fontSize:14,fontWeight:"700",cursor:"pointer",borderRadius:12}}>대기</button>
            <button onClick={()=>{if(!validate())return;if(isEdit){updateOrder(editOrder.id,form);}else{addOrder(form,"접수");}setDone(true);}} style={{flex:2,...bigBtn(true),borderRadius:12,padding:"13px 0",fontSize:14}}>화물차 호출</button>
          </div>
        </div>
      </div>
      {(modal==="fromSido"||modal==="toSido")&&<Modal title="시/도 선택" onClose={()=>setModal(null)}>
        {form.tonnage==="오토바이"&&<div style={{background:"#FFF3E0",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#E65100",fontWeight:"700"}}>⚠ 오토바이는 서울·경기 지역만 가능합니다</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {Object.keys(RG).map(s=>{
            const disabled=form.tonnage==="오토바이"&&s!=="서울"&&s!=="경기";
            return(<button key={s} style={{background:disabled?"#F5F5F5":IBG,border:"none",borderRadius:10,padding:"12px 4px",fontSize:13,fontWeight:"700",cursor:disabled?"not-allowed":"pointer",color:disabled?"#ccc":TEXT,opacity:disabled?0.5:1}} onClick={()=>!disabled&&selectSido(s)}>{s}</button>);
          })}
        </div>
      </Modal>}
      {(modal==="fromGu"||modal==="toGu")&&<Modal title={`${tmpSido} 구/군 선택`} onClose={()=>setModal(null)}><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{Object.keys((RG[tmpSido]||{})).map(g=><button key={g} style={{background:IBG,border:"none",borderRadius:10,padding:"12px 4px",fontSize:12,fontWeight:"700",cursor:"pointer",color:TEXT}} onClick={()=>selectGu(g)}>{g}</button>)}</div></Modal>}
      {(modal==="fromDong"||modal==="toDong")&&<Modal title={`${tmpGu} 동/읍/면 선택`} onClose={()=>setModal(null)}><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>{getDongs().map(d=><button key={d} style={{background:IBG,border:"none",borderRadius:10,padding:"12px 4px",fontSize:12,fontWeight:"700",cursor:"pointer",color:TEXT}} onClick={()=>selectDong(d)}>{d}</button>)}</div></Modal>}

function FreightListScreen({orders,onEditOrder,onChangeStatus}){
  const[tab,setTab]=useState("전체");
  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");
  const TABS=["전체","접수","운송","완료","취소"];

  const filtered=orders.filter(o=>{
    if(tab!=="전체"&&o.status!==tab) return false;
    if(dateFrom&&o.date<dateFrom) return false;
    if(dateTo&&o.date>dateTo) return false;
    return true;
  });
  const list=filtered;

  const clearDate=()=>{setDateFrom("");setDateTo("");};
  const isFiltered=dateFrom||dateTo;

  const NEXT={접수:"운송",운송:"완료"};
  const NEXT_LABEL={접수:"운송 배정",운송:"완료 처리"};
  const NEXT_BG={접수:"#D97706",운송:GRN};
  const SC2={접수:"#7C3AED",운송:"#D97706",완료:GRN,취소:RED,대기:SUB};
  return(
    <div style={{background:BG,minHeight:"100vh",paddingBottom:70}}>
      {/* 탭 + 검색 아이콘 */}
      <div style={{background:CARD,borderBottom:`2px solid ${BR}`,display:"flex",alignItems:"center"}}>
        {TABS.map(t=>{
          const cnt=t==="전체"?orders.length:orders.filter(o=>o.status===t).length;
          const active=tab===t;
          const col=SC2[t]||P;
          return(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"11px 0",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderBottom:active?`2.5px solid ${col}`:"2.5px solid transparent"}}>
              <span style={{fontSize:13,fontWeight:"800",color:active?col:SUB}}>{t}</span>
              {cnt>0&&<span style={{fontSize:10,fontWeight:"800",color:active?"#fff":SUB,background:active?col:BR,borderRadius:8,padding:"1px 5px",lineHeight:"14px"}}>{cnt}</span>}
            </button>
          );
        })}

      </div>

      {/* 날짜 검색 패널 */}
      {
        <div style={{background:CARD,padding:"12px 14px",borderBottom:`1px solid ${BR}`,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
            <span style={{fontSize:12,color:SUB,fontWeight:"700",whiteSpace:"nowrap"}}>시작</span>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
              style={{flex:1,border:`1px solid ${BR}`,borderRadius:8,padding:"7px 8px",fontSize:13,color:TEXT,outline:"none",background:IBG}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
            <span style={{fontSize:12,color:SUB,fontWeight:"700",whiteSpace:"nowrap"}}>종료</span>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
              style={{flex:1,border:`1px solid ${BR}`,borderRadius:8,padding:"7px 8px",fontSize:13,color:TEXT,outline:"none",background:IBG}}/>
          </div>
          {isFiltered&&(
            <button onClick={clearDate} style={{padding:"7px 12px",border:"none",borderRadius:8,background:RED,color:"#fff",fontSize:12,fontWeight:"700",cursor:"pointer",flexShrink:0}}>초기화</button>
          )}
        </div>
      )}

      {/* 검색 결과 요약 */}
      {isFiltered&&(
        <div style={{padding:"7px 14px",background:PL,borderBottom:`1px solid ${BR}`,fontSize:12,color:P,fontWeight:"700"}}>
          📅 {dateFrom||"처음"} ~ {dateTo||"현재"} · 총 {list.length}건
        </div>
      )}

      <div style={{padding:"10px 10px 0"}}>
        {list.length===0&&<div style={{textAlign:"center",color:SUB,marginTop:50,fontSize:13}}>해당 건이 없습니다.</div>}
        {list.map(o=>{
          const isEditable=o.status==="대기";
          const nextSt=NEXT[o.status];
          const col=SC2[o.status]||SUB;
          return(
            <div key={o.id} style={{background:CARD,borderRadius:10,marginBottom:7,borderLeft:`3px solid ${col}`,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
              <div style={{padding:"9px 12px",borderBottom:`1px solid ${BR}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{background:SBG[o.status]||"#f5f5f5",color:col,borderRadius:10,padding:"2px 9px",fontSize:11,fontWeight:"800"}}>{o.status}</span>

                </div>

              </div>
              <div style={{padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:TEXT,fontWeight:"700",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}><span style={{color:GRN}}>●</span> {o.fromSido} {o.fromGu} {o.fromDong}</div>
                  <div style={{fontSize:11,color:SUB,margin:"2px 0 2px 8px"}}>↓</div>
                  <div style={{fontSize:12,color:TEXT,fontWeight:"700",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}><span style={{color:P}}>●</span> {o.toSido} {o.toGu} {o.toDong}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:14,fontWeight:"900",color:P}}>{fmt(o.price)}원</div>
                  <div style={{fontSize:10,color:SUB,marginTop:2}}>{o.tonnage} · {o.vehicleType}</div>
                </div>
              </div>
              <div style={{padding:"0 12px 9px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                <span style={{fontSize:10,color:SUB,flex:1}}>{o.date} {o.time} · {o.phone}</span>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  {o.status!=="완료"&&o.status!=="취소"&&(<button onClick={()=>{if(window.confirm("취소 처리하시겠습니까?"))onChangeStatus(o.id,"취소");}} style={{padding:"5px 9px",border:`1px solid ${BR}`,borderRadius:7,background:"#fff",color:SUB,fontSize:11,fontWeight:"600",cursor:"pointer"}}>취소</button>)}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setScreen("companyInfo")} style={{...outlineBtn,flex:1}}>닫기</button>
          <button onClick={()=>{if(!form.companyName||!form.manager){alert("필수 항목을 입력하세요.");return;}if(form.pw!==form.pw2){alert("비밀번호가 일치하지 않습니다.");return;}if(!agreed){alert("개인정보취급방침에 동의해 주세요.");return;}setDone(true);}} style={{flex:2,...bigBtn(),padding:"14px"}}>가입하기</button>
        </div>
      </div>
    </div>
  );
}

function PartnershipScreen({setScreen}){
  const[form,setForm]=useState({name:"",phone:"",content:""});const[done,setDone]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  if(done)return(<div style={{padding:40,textAlign:"center",background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:48,marginBottom:16}}>📬</div><div style={{fontSize:22,fontWeight:"900",color:TEXT,marginBottom:8}}>접수 완료!</div><div style={{color:SUB,marginBottom:28}}>검토 후 연락 드리겠습니다.</div><button onClick={()=>{setDone(false);setForm({name:"",phone:"",content:""}); }} style={{...bigBtn(),maxWidth:200}}>확인</button></div>);
  return(
    <div style={{padding:"16px",background:BG,minHeight:"100vh"}}>
      <div style={{...cardS,padding:20}}>
        <Field label="이름"><input style={inp} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="이름 입력"/></Field>
        <Field label="전화번호"><input style={inp} value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="010-0000-0000" type="tel"/></Field>
        <Field label="내용"><textarea style={{...inp,minHeight:130,resize:"none"}} value={form.content} onChange={e=>set("content",e.target.value)} placeholder="제휴 또는 건의 내용을 입력하세요"/></Field>
        <div style={{fontSize:12,color:SUB,textAlign:"center",marginBottom:20}}>검토 후 연락 드리겠습니다</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setScreen("more")} style={{...outlineBtn,flex:1}}>닫기</button>
          <button onClick={()=>{if(!form.name||!form.phone||!form.content){alert("모든 항목을 입력해 주세요.");return;}setDone(true);}} style={{flex:2,...bigBtn(),padding:"14px"}}>접수하기</button>
        </div>
      </div>
    </div>
  );
}

function BottomNav({screen,setScreen}){
  const tabs=[{label:"메인",icon:"🏠",s:"home"},{label:"운송목록",icon:"📋",s:"freightList"},{label:"더보기",icon:"☰",s:"more"}];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:CARD,display:"flex",borderTop:`1px solid ${BR}`,zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
      {tabs.map(t=>(<button key={t.s} onClick={()=>setScreen(t.s)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:11,color:screen===t.s?P:SUB,fontWeight:"700"}}>{t.label}</span>{screen===t.s&&<div style={{width:4,height:4,borderRadius:"50%",background:P,marginTop:1}}></div>}</button>))}
    </div>
  );
}

function App(){
  const[splash,setSplash]=useState(true);
  const[screen,setScreen]=useState("home");
  const[orders,setOrders]=useState([]);
  const[editOrder,setEditOrder]=useState(null);
  const[savedPhone,setSavedPhone]=useState(USER_PHONE);
  const[userName,setUserName]=useState("");
  const[storageReady,setStorageReady]=useState(false);

  // 스토리지에서 데이터 로드 (앱 시작시)
  useEffect(()=>{
    const load=()=>{
      try{ const ph=localStorage.getItem('user-phone'); if(ph) setSavedPhone(ph); }catch(e){}
      try{ const un=localStorage.getItem('user-name'); if(un) setUserName(un); }catch(e){}
      try{
        const od=localStorage.getItem('orders-data');
        if(od){ const parsed=JSON.parse(od); if(Array.isArray(parsed)&&parsed.length>0){ setOrders(parsed); } else{ setOrders(INIT_ORDERS); } }
        else{ setOrders(INIT_ORDERS); }
      }catch(e){ setOrders(INIT_ORDERS); }
      setStorageReady(true);
    };
    load();
  },[]);

  // orders 변경시 스토리지에 저장
  useEffect(()=>{
    if(!storageReady) return;
    try{localStorage.setItem('orders-data',JSON.stringify(orders));}catch(e){};
  },[orders, storageReady]);

  useEffect(()=>{const t=setTimeout(()=>setSplash(false),1800);return()=>clearTimeout(t);},[]);

  const ts=()=>{const now=new Date();const p=n=>String(n).padStart(2,"0");return`${String(now.getFullYear()).slice(2)}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;};

  const addOrder=(form,status="접수")=>{
    // 전화번호 저장
    if(form.phone&&form.phone!==savedPhone){
      setSavedPhone(form.phone);
      try{localStorage.setItem('user-phone',form.phone);}catch(e){};
    }
    setOrders(prev=>[{...form,id:Date.now(),status,at:ts()},...prev]);
  };
  const updateOrder=(id,form)=>{setOrders(prev=>prev.map(o=>o.id===id?{...o,...form,at:ts()}:o));setEditOrder(null);};
  const changeStatus=(id,status)=>{setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));};
  const goEditOrder=order=>{setEditOrder(order);setScreen("freightCall");};

  const TITLES={freightCall:editOrder?"운송 수정":"화물차 호출",freightList:"운송목록",driverSignup:"기사가입",companySignup:"업체회원 가입",partnership:"제휴·건의",more:"더보기"};
  const BACKS={freightCall:"home",freightList:"home",driverSignup:"more",companySignup:"more",partnership:"more"};
  const NONAV=["freightCall","driverSignup","companySignup","partnership"];

  const SubHeader=()=>TITLES[screen]&&(
    <div style={{background:CARD,padding:"14px 16px",borderBottom:`1px solid ${BR}`,display:"flex",alignItems:"center",gap:10}}>
      {BACKS[screen]&&(<button onClick={()=>{if(screen==="freightCall")setEditOrder(null);setScreen(BACKS[screen]);}} style={{background:"none",border:"none",color:TEXT,fontSize:20,cursor:"pointer",padding:0,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32}}>‹</button>)}
      <span style={{fontSize:17,fontWeight:"800",color:TEXT,flex:1,textAlign:BACKS[screen]?"center":"left"}}>{TITLES[screen]}</span>
      {BACKS[screen]&&<div style={{width:32}}></div>}
    </div>
  );

  if(splash)return(<div style={{fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",background:P,minHeight:"100vh",display:"flex",justifyContent:"center"}}><div style={{width:"100%",maxWidth:430}}><SplashScreen/></div></div>);

  return(
    <div style={{fontFamily:"'Noto Sans KR','Apple SD Gothic Neo',sans-serif",background:"#E2E5EC",minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:430,background:BG,minHeight:"100vh",position:"relative",boxShadow:"0 0 40px rgba(0,0,0,0.15)"}}>
        <SubHeader/>
        <div style={{paddingBottom:NONAV.includes(screen)?40:70}}>
          {screen==="home"&&<HomeScreen setScreen={setScreen} orders={orders} onEditOrder={goEditOrder}/>}
          {screen==="freightCall"&&<FreightCallScreen setScreen={setScreen} addOrder={addOrder} editOrder={editOrder} updateOrder={updateOrder} clearEdit={()=>setEditOrder(null)} savedPhone={savedPhone}/>}
          {screen==="freightList"&&<FreightListScreen orders={orders} onEditOrder={goEditOrder} onChangeStatus={changeStatus}/>}
          {screen==="more"&&<MoreScreen setScreen={setScreen} userName={userName} onSaveName={(n)=>{setUserName(n);try{localStorage.setItem('user-name',n);}catch(e){};}}/>}
          {screen==="driverSignup"&&<DriverSignupScreen setScreen={setScreen}/>}
          {screen==="companySignup"&&<CompanySignupScreen setScreen={setScreen}/>}
          {screen==="partnership"&&<PartnershipScreen setScreen={setScreen}/>}
        </div>
        {!NONAV.includes(screen)&&<BottomNav screen={screen} setScreen={setScreen}/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
